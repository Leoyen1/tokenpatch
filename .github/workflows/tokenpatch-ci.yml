name: tokenpatch-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  contract-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,gateway]"

      - name: Verify Dashboard Contract
        run: python gateway/scripts/verify_dashboard_contract.py --json

      - name: Run Unit Tests
        run: python -m pytest -q

      - name: Run Example Tests
        working-directory: examples/todo-app
        run: python -m pytest -q
